<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品学习系统 · Everly</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f1117; --sur:#181c27; --sur2:#1e2436; --sur3:#252b3d;
  --bdr:#2d3554; --bdr2:#3a4260;
  --acc:#5b8dee; --acc2:#43d9a0; --acc3:#f0a84a; --acc4:#c678dd;
  --red:#e06c75; --txt:#d4daf5; --txt2:#8892b8; --txt3:#515d8a;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;line-height:1.6;}

/* ── HEADER ── */
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;gap:12px;}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#5b8dee,#c678dd);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.3px;}
.hdr-sub{font-size:11.5px;color:var(--txt3);margin-top:1px;}
.hdr-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--bdr);font-size:12.5px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-weight:500;white-space:nowrap;}
.btn-prim{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-prim:hover{background:#7aa3f5;}
.btn-ok{background:rgba(67,217,160,.15);color:var(--acc2);border-color:rgba(67,217,160,.3);}
.btn-ok:hover{background:rgba(67,217,160,.25);}
.btn-ghost{background:transparent;color:var(--txt2);}
.btn-ghost:hover{background:var(--sur2);color:var(--txt);}
.btn-danger{background:rgba(224,108,117,.12);color:var(--red);border-color:rgba(224,108,117,.25);}
.btn-danger:hover{background:rgba(224,108,117,.22);}
.saved-flash{font-size:12px;color:var(--acc2);display:none;align-items:center;gap:4px;}
.saved-flash.show{display:inline-flex;}

/* ── TABS ── */
.tabs-bar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 24px;display:flex;gap:2px;}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--txt3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--txt2);}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}

/* ── MAIN LAYOUT ── */
.main{padding:22px 24px;max-width:1700px;margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:360px;}
.search-wrap input{width:100%;background:var(--sur);border:1px solid var(--bdr);color:var(--txt);padding:8px 12px 8px 34px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--acc);}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:15px;}
.fsel{background:var(--sur);border:1px solid var(--bdr);color:var(--txt);padding:8px 12px;border-radius:7px;font-size:12.5px;font-family:inherit;cursor:pointer;outline:none;}
.fsel:focus{border-color:var(--acc);}
.cnt{font-size:12px;color:var(--txt3);padding:8px 4px;}

/* ── STATS ── */
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;padding:12px 18px;}
.stat-lbl{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.stat-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px;}

/* ── PRODUCT TABLE ── */
.tbl-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px;}
thead th{background:var(--sur2);padding:10px 13px;text-align:left;font-weight:600;font-size:11px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--txt2);}
thead th.sa::after{content:' ▲';font-size:9px;}
thead th.sd::after{content:' ▼';font-size:9px;}
/* Table group headers */
thead .th-group{background:var(--sur3);font-size:10px;text-align:center;color:var(--txt3);padding:5px 8px;border-bottom:1px solid var(--bdr);letter-spacing:.4px;}
thead .th-group.g-acc{color:var(--acc);background:rgba(91,141,238,.06);}
thead .th-group.g-grn{color:var(--acc2);background:rgba(67,217,160,.06);}
thead .th-group.g-gld{color:var(--acc3);background:rgba(240,168,74,.06);}
thead .th-group.g-pur{color:var(--acc4);background:rgba(198,120,221,.06);}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .15s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--sur2);}
tbody td{padding:10px 13px;vertical-align:top;}
.no-data{text-align:center;padding:48px;color:var(--txt3);}

/* ── CAPABILITY CELLS ── */
.cap-cell{max-width:220px;}
.cap-snippet{font-size:11.5px;color:var(--txt2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.cap-snippet.empty{color:var(--txt3);font-style:italic;}
.cap-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;border-radius:10px;margin-bottom:4px;font-weight:600;}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.t-blu{background:rgba(91,141,238,.13);color:var(--acc);border:1px solid rgba(91,141,238,.22);}
.t-grn{background:rgba(67,217,160,.12);color:var(--acc2);border:1px solid rgba(67,217,160,.22);}
.t-gld{background:rgba(240,168,74,.12);color:var(--acc3);border:1px solid rgba(240,168,74,.22);}
.t-pur{background:rgba(198,120,221,.12);color:var(--acc4);border:1px solid rgba(198,120,221,.22);}
.t-org{background:rgba(255,160,60,.1);color:#ffa03c;border:1px solid rgba(255,160,60,.2);}

/* ── DETAIL / EDIT MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:flex-start;justify-content:center;padding:28px 20px;backdrop-filter:blur(3px);overflow-y:auto;}
.ov.open{display:flex;}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;max-width:980px;width:100%;animation:mIn .2s ease;position:relative;}
@keyframes mIn{from{opacity:0;transform:translateY(12px) scale(.98);}to{opacity:1;transform:none;}}
.mhdr{padding:18px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.mhdr-left{flex:1;min-width:0;}
.mtitle{font-size:17px;font-weight:700;}
.msub{font-size:12px;color:var(--txt3);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.mcls{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:5px;line-height:1;flex-shrink:0;}
.mcls:hover{background:var(--sur2);color:var(--txt);}
.mbody{padding:18px 22px 22px;max-height:80vh;overflow-y:auto;}

/* ── FORM FIELDS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.flbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);display:flex;align-items:center;gap:6px;}
.flbl .ref-btn{font-size:10px;padding:1px 7px;background:rgba(91,141,238,.12);color:var(--acc);border:1px solid rgba(91,141,238,.25);border-radius:4px;cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500;transition:all .2s;}
.flbl .ref-btn:hover{background:rgba(91,141,238,.22);}
.finput,.fta{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);padding:8px 11px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;width:100%;}
.finput:focus,.fta:focus{border-color:var(--acc);}
.fta{resize:vertical;min-height:90px;line-height:1.65;}
.fta.tall{min-height:140px;}
.mfooter{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr);}

/* ── CELL PREVIEW ── */
.cell-prev{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
.cell-mono{font-family:'JetBrains Mono',monospace;font-size:12px;}

/* ── SELECTION PANEL ── */
.sel-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;}
@media(max-width:900px){.sel-layout{grid-template-columns:1fr;}}
.sel-sidebar{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;position:sticky;top:84px;}
.sel-sidebar-hdr{padding:12px 16px;font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bdr);background:var(--sur2);}
.sel-cat-btn{width:100%;padding:11px 16px;background:none;border:none;border-bottom:1px solid var(--bdr);cursor:pointer;text-align:left;font-family:inherit;font-size:13px;font-weight:500;color:var(--txt2);display:flex;align-items:center;gap:10px;transition:all .2s;}
.sel-cat-btn:last-child{border-bottom:none;}
.sel-cat-btn:hover{background:var(--sur2);color:var(--txt);}
.sel-cat-btn.active{background:rgba(91,141,238,.1);color:var(--acc);}
.sel-cat-btn .cnt-pill{margin-left:auto;font-size:10.5px;background:var(--sur2);color:var(--txt3);padding:1px 7px;border-radius:10px;}
.sel-content{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;}
.sel-c-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.sel-c-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.sel-c-desc{font-size:11.5px;color:var(--txt3);margin-top:3px;}
.sel-item-list{padding:0;}
.sel-item{border-bottom:1px solid var(--bdr);padding:14px 18px;display:flex;gap:10px;align-items:flex-start;position:relative;transition:background .15s;}
.sel-item:last-child{border-bottom:none;}
.sel-item:hover{background:var(--sur2);}
.sel-item-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3);min-width:22px;padding-top:2px;font-weight:600;}
.sel-item-body{flex:1;min-width:0;}
.sel-item-text{font-size:13px;line-height:1.7;color:var(--txt2);white-space:pre-wrap;word-break:break-word;}
.sel-item-text.editing{display:none;}
.sel-item-edit{display:none;width:100%;}
.sel-item-edit.editing{display:block;}
.sel-item-actions{display:flex;gap:6px;margin-top:8px;}
.item-btn{padding:3px 10px;font-size:11px;border-radius:5px;border:1px solid var(--bdr);background:transparent;cursor:pointer;font-family:inherit;color:var(--txt2);transition:all .15s;}
.item-btn:hover{background:var(--sur3);color:var(--txt);}
.item-btn.save{color:var(--acc2);border-color:rgba(67,217,160,.3);}
.item-btn.save:hover{background:rgba(67,217,160,.1);}
.item-btn.copy{color:var(--acc);border-color:rgba(91,141,238,.3);}
.item-btn.copy:hover{background:rgba(91,141,238,.1);}
.item-btn.use{color:var(--acc3);border-color:rgba(240,168,74,.3);}
.item-btn.use:hover{background:rgba(240,168,74,.1);}
.item-btn.del{color:var(--red);border-color:rgba(224,108,117,.25);}
.item-btn.del:hover{background:rgba(224,108,117,.1);}
.add-item-row{padding:12px 18px;border-top:1px solid var(--bdr);display:flex;gap:8px;}
.add-item-input{flex:1;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);padding:7px 11px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;}
.add-item-input:focus{border-color:var(--acc);}

/* ── REFERENCE DRAWER ── */
.ref-drawer{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center;}
.ref-drawer.open{display:flex;}
.ref-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:0;}
.ref-panel{position:relative;background:var(--sur);border:1px solid var(--bdr);border-radius:14px 14px 0 0;width:100%;max-width:820px;max-height:70vh;display:flex;flex-direction:column;animation:slideUp .22s ease;z-index:1;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:none;opacity:1;}}
.ref-panel-hdr{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.ref-panel-title{font-size:14px;font-weight:700;color:var(--acc);}
.ref-panel-sub{font-size:12px;color:var(--txt3);margin-top:3px;}
.ref-panel-cls{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:5px;}
.ref-panel-cls:hover{background:var(--sur2);}
.ref-panel-body{overflow-y:auto;flex:1;}
.ref-section{border-bottom:1px solid var(--bdr);}
.ref-section:last-child{border-bottom:none;}
.ref-section-title{padding:10px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;background:var(--sur2);color:var(--txt3);}
.ref-row{padding:11px 20px;border-bottom:1px solid rgba(45,53,84,.4);display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:background .15s;}
.ref-row:last-child{border-bottom:none;}
.ref-row:hover{background:var(--sur2);}
.ref-row-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3);min-width:20px;padding-top:2px;}
.ref-row-text{font-size:12.5px;color:var(--txt2);line-height:1.65;flex:1;white-space:pre-wrap;word-break:break-word;}
.ref-row:hover .ref-row-text{color:var(--txt);}
.ref-use-hint{font-size:10px;color:var(--acc);margin-top:4px;opacity:0;}
.ref-row:hover .ref-use-hint{opacity:1;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--txt3);}

/* ── MISC ── */
.highlight{background:rgba(91,141,238,.22);border-radius:2px;padding:0 1px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.empty-sel{padding:28px;text-align:center;color:var(--txt3);font-size:13px;}
.copy-toast{position:fixed;bottom:28px;right:28px;background:var(--acc2);color:#0f1117;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.copy-toast.show{opacity:1;}

/* ── SALES CARD VIEW (Tab1 detail modal) ── */
.sales-view{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sales-block{background:var(--sur2);border:1px solid var(--bdr);border-radius:9px;padding:13px 15px;}
.sales-block.full{grid-column:1/-1;}
.sales-block-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sales-block-body{font-size:12.5px;color:var(--txt2);line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.sales-block-body.empty{color:var(--txt3);font-style:italic;}

</style>
</head>
<body>

<!-- COPY TOAST -->
<div class="copy-toast" id="copyToast">✓ 已复制到剪贴板</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">E</div>
    <div>
      <div class="hdr-title">产品学习系统</div>
      <div class="hdr-sub">Everly · 2026 工业电脑知识库 · 可编辑 · 支持导出</div>
    </div>
  </div>
  <div class="hdr-actions">
    <span class="saved-flash" id="savedFlash">✓ 已自动保存</span>
    <button class="btn btn-ok" onclick="exportExcel()">⬇ 导出 Excel</button>
    <button class="btn btn-prim" onclick="openAddModal()">＋ 新增产品</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <div class="tab active" onclick="switchTab('t1',this)">📋 2026 产品总结表</div>
  <div class="tab" onclick="switchTab('t2',this)">📌 SELECTION 卖点素材库</div>
</div>

<div class="main">

<!-- ─── TAB 1: PRODUCT TABLE ─── -->
<div class="tab-panel active" id="t1">
  <div class="stats" id="statsBar"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="srch" placeholder="搜索型号、料号、描述、亮点…" oninput="doFilter()">
    </div>
    <select class="fsel" id="typeFilt" onchange="doFilter()">
      <option value="">全部类型</option>
    </select>
    <span class="cnt" id="cntBadge"></span>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="doSort(0)" style="width:44px">#</th>
          <th onclick="doSort(1)" style="width:82px">日期</th>
          <th onclick="doSort(2)" style="width:110px">类型</th>
          <th onclick="doSort(3)" style="width:130px">型号</th>
          <th style="width:120px">料号</th>
          <th style="width:220px">料号描述（规格）</th>
          <th style="width:200px">⚡ 计算与系统性能</th>
          <th style="width:200px">🏭 工业稳定运行</th>
          <th style="width:200px">🛡 工业环境适应</th>
          <th style="width:200px">🔗 连接与扩展</th>
          <th style="width:140px">✨ 产品特点 / 场景</th>
          <th style="width:80px" class="no-sort">操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- ─── TAB 2: SELECTION ─── -->
<div class="tab-panel" id="t2">
  <div class="toolbar">
    <div class="search-wrap" style="max-width:320px">
      <span class="si">🔍</span>
      <input type="text" id="selSrch" placeholder="搜索卖点内容…" oninput="filterSel()">
    </div>
    <button class="btn btn-ghost" onclick="addSelItem()">＋ 新增条目</button>
    <span style="font-size:12px;color:var(--txt3);padding:8px 4px;">💡 点击条目可编辑 · 点击「引用」可插入到产品详情</span>
  </div>

  <div class="sel-layout">
    <div class="sel-sidebar">
      <div class="sel-sidebar-hdr">能力维度</div>
      <div id="catSidebar"></div>
      <div style="border-top:1px solid var(--bdr);padding:10px 12px;">
        <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px;" onclick="promptAddCat()">＋ 新增自定义分类</button>
      </div>
    </div>
    <div class="sel-content" id="selContent"></div>
  </div>
</div>

</div><!-- .main -->

<!-- ─── PRODUCT EDIT MODAL ─── -->
<div class="ov" id="editOv" onclick="if(event.target===this)closeEdit()">
<div class="modal" id="editModal">
  <div class="mhdr">
    <div class="mhdr-left">
      <div class="mtitle" id="editTitle">产品详情</div>
      <div class="msub" id="editSub"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="editModeBadge" style="font-size:11px;padding:3px 9px;border-radius:5px;background:rgba(91,141,238,.15);color:var(--acc);font-weight:600;">编辑模式</span>
      <button class="mcls" onclick="closeEdit()">✕</button>
    </div>
  </div>
  <div class="mbody">
    <div class="form-grid">
      <div class="form-group">
        <label class="flbl">日期</label>
        <input class="finput" id="f_date" type="date">
      </div>
      <div class="form-group">
        <label class="flbl">产品类型</label>
        <input class="finput" id="f_type" placeholder="EPC BOX PC / EPC PANEL PC / UTC / AI / WPC">
      </div>

// Load from localStorage if available
function loadData() {
  try {
    const saved = localStorage.getItem('everly_products');
    const savedSel = localStorage.getItem('everly_selection');
    return {
      products: saved ? JSON.parse(saved) : INITIAL.sheet1.map((r,i)=>({...r,_id:Date.now()+i})),
      selection: savedSel ? JSON.parse(savedSel) : INITIAL.sheet2
    };
  } catch(e) {
    return {
      products: INITIAL.sheet1.map((r,i)=>({...r,_id:Date.now()+i})),
      selection: INITIAL.sheet2
    };
  }
}

function buildFilters() {
  const types = [...new Set(products.map(r=>r['产品类型']).filter(Boolean))];
  const sel = document.getElementById('typeFilt');
  types.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t; sel.appendChild(o);
  });
}

function renderStats() {
  const typeCounts = {};
  products.forEach(r => { if(r['产品类型']) typeCounts[r['产品类型']] = (typeCounts[r['产品类型']]||0)+1; });
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-lbl">产品总数</div><div class="stat-val" style="color:var(--acc)">${products.length}</div></div>
    ${Object.entries(typeCounts).map(([k,v])=>{
      const t=tc(k);
      return `<div class="stat"><div class="stat-lbl">${k}</div><div class="stat-val" style="color:${t.dot}">${v}</div></div>`;
    }).join('')}
  `;
}

      <td style="font-weight:600;color:var(--txt)" class="cell-mono">${esc(r['型号'])||'—'}</td>
      <td style="color:var(--txt3);font-size:11px" class="cell-mono" title="${esc(r['料号'])}">${esc(r['料号'])||'—'}</td>
      <td><div style="font-size:11.5px;color:var(--txt2);max-width:220px;word-break:break-all;white-space:normal;line-height:1.5" title="${esc(r['料号描述'])}">${esc(desc)}${(r['料号描述']||'').length>60?'…':''}</div></td>
      <td class="cap-cell"><div class="cap-snippet${perf?'':' empty'}">${perf?esc(perf)+'…':'—'}</div></td>
      <td class="cap-cell"><div class="cap-snippet${stab?'':' empty'}">${stab?esc(stab)+'…':'—'}</div></td>
      <td class="cap-cell"><div class="cap-snippet${env?'':' empty'}">${env?esc(env)+'…':'—'}</div></td>
      <td class="cap-cell"><div class="cap-snippet${conn?'':' empty'}">${conn?esc(conn)+'…':'—'}</div></td>
      <td><div class="cell-prev" title="${esc(feat)}" style="color:${feat?'var(--acc3)':'var(--txt3)'}">${feat?esc(feat.substring(0,40))+(feat.length>40?'…':''):'—'}</div></td>
      <td onclick="event.stopPropagation()">
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="openEdit(${r._id})">✏ 编辑</button>
      </td>
    </tr>`;
  }).join('');
}

function doFilter() {
  const q = document.getElementById('srch').value.toLowerCase();
  const type = document.getElementById('typeFilt').value;
  filtered = products.filter(r => {
    const mType = !type || r['产品类型'] === type;
    const mQ = !q || JSON.stringify(r).toLowerCase().includes(q);
    return mType && mQ;
  });
  if (sortCol >= 0) applySort();
  renderTable();
}

const sortKeys = [null,'时间','产品类型','型号','料号'];
function doSort(col) {
  if (col >= sortKeys.length) return;
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach((th,i) => {
    th.classList.remove('sa','sd');
    if (i===col) th.classList.add(sortDir===1?'sa':'sd');
  });
  applySort();
  renderTable();
}
function applySort() {
  const key = sortKeys[sortCol];
  if (!key) return;
  filtered.sort((a,b) => (a[key]||'').localeCompare(b[key]||'','zh') * sortDir);
}

function saveProduct() {
  const data = {
    '编号': document.getElementById('f_num').value.trim(),
    '时间': document.getElementById('f_date').value,
    '产品类型': document.getElementById('f_type').value.trim(),
    '型号': document.getElementById('f_model').value.trim(),
    '料号': document.getElementById('f_pn').value.trim(),
    '料号描述': document.getElementById('f_desc').value.trim(),
    '计算与系统性能': document.getElementById('f_perf').value.trim(),
    '工业稳定运行': document.getElementById('f_stab').value.trim(),
    '工业环境适应': document.getElementById('f_env').value.trim(),
    '连接与扩展': document.getElementById('f_conn').value.trim(),
    '模块构成': document.getElementById('f_module').value.trim(),
    '产品特点': document.getElementById('f_feat').value.trim(),
    '产品介绍': document.getElementById('f_intro').value.trim(),
    '行业痛点': document.getElementById('f_pain').value.trim(),
    '销售亮点': document.getElementById('f_high').value.trim(),
    '应用场景': document.getElementById('f_scene').value.trim(),
  };
  if (currentEditId !== null) {
    const idx = products.findIndex(p => p._id === currentEditId);
    if (idx >= 0) products[idx] = { ...products[idx], ...data };
  } else {
    data._id = Date.now();
    products.push(data);
    // Rebuild type filters
    [document.getElementById('typeFilt')].forEach(sel => {
      if (sel && data['产品类型'] && !Array.from(sel.options).some(o=>o.value===data['产品类型'])) {
        const o = document.createElement('option');
        o.value = data['产品类型']; o.textContent = data['产品类型'];
        sel.appendChild(o);
      }
    });
  }
  filtered = [...products];
  renderStats();
  renderTable();
  saveAll();
  closeEdit();
}

function deleteProduct() {
  if (!confirm('确认删除该产品记录？')) return;
  products = products.filter(p => p._id !== currentEditId);
  filtered = [...products];
  renderStats();
  renderTable();
  saveAll();
  closeEdit();
}

function renderSidebar() {
  const sidebar = document.getElementById('catSidebar');
  const allCats = getAllCats();
  sidebar.innerHTML = allCats.map(cat => {
    const meta = getCustomCatMeta(cat);
    const cnt = selection.items.filter(it => (it[cat]||'').trim()).length;
    const isCustom = !CORE_CATS.includes(cat);
    const isActive = cat === currentCat;
    return `<div style="display:flex;align-items:center;border-bottom:1px solid var(--bdr);">
      <button class="sel-cat-btn${isActive?' active':''}" id="catBtn_${esc(cat)}" onclick="switchCat(${JSON.stringify(cat)},this)" style="flex:1;border-bottom:none;">
        <span>${meta.emoji}</span> ${esc(cat)}
        <span class="cnt-pill" id="cnt_${esc(cat)}">${cnt}</span>
      </button>
      ${isCustom ? `<button onclick="deleteCustomCat(${JSON.stringify(cat)})" title="删除分类" style="background:none;border:none;color:var(--txt3);cursor:pointer;padding:0 10px;font-size:14px;flex-shrink:0;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--txt3)'">✕</button>` : ''}
    </div>`;
  }).join('');
}

function renderSelCounts() {
  getAllCats().forEach(c => {
    const cnt = selection.items.filter(it => (it[c]||'').trim()).length;
    const el = document.getElementById('cnt_'+c);
    if (el) el.textContent = cnt;
  });
}

function switchCat(cat, el) {
  currentCat = cat;
  renderSidebar();
  renderSel();
}

function promptAddCat() {
  const name = prompt('输入新分类名称（如：其他 / 售后服务 / 认证资质）：');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (getAllCats().includes(trimmed)) { alert('该分类已存在'); return; }
  if (!selection.custom_cats) selection.custom_cats = [];
  selection.custom_cats.push(trimmed);
  if (!selection.sub_headers) selection.sub_headers = {};
  selection.sub_headers[trimmed] = '';
  saveAll();
  currentCat = trimmed;
  renderSidebar();
  renderSel();
}

function deleteCustomCat(cat) {
  if (!confirm(`删除分类「${cat}」？该分类下的卖点条目也会一并删除。`)) return;
  selection.custom_cats = (selection.custom_cats||[]).filter(c => c !== cat);
  selection.items.forEach(it => { delete it[cat]; });
  if (currentCat === cat) currentCat = CORE_CATS[0];
  saveAll();
  renderSidebar();
  renderSel();
}

function renderSel(query) {
  const meta = getCustomCatMeta(currentCat);
  const q = query || document.getElementById('selSrch').value.toLowerCase();
  const sub = (selection.sub_headers && selection.sub_headers[currentCat]) || '';

  const items = selection.items.filter(it => {
    const txt = it[currentCat] || '';
    if (!txt.trim()) return false;
    if (q) return txt.toLowerCase().includes(q);
    return true;
  });

  const html = `
    <div class="sel-c-hdr">
      <div>
        <div class="sel-c-title" style="color:${meta.color}"><span>${meta.emoji}</span>${currentCat}能力</div>
        ${sub ? `<div class="sel-c-desc">${esc(sub)}</div>` : ''}
      </div>
    </div>
    <div class="sel-item-list" id="selItemList">
      ${items.length ? items.map(it => renderSelItem(it, q)).join('') : `<div class="empty-sel">暂无内容，点击「新增条目」添加</div>`}
    </div>
    <div class="add-item-row">
      <textarea class="add-item-input" id="newItemInput" rows="2" placeholder="输入新卖点内容，点击添加…"></textarea>
      <button class="btn btn-prim" onclick="commitAddItem()" style="align-self:flex-end">添加</button>
    </div>
  `;
  document.getElementById('selContent').innerHTML = html;
}

function renderSelItem(it, q) {
  const text = it[currentCat] || '';
  const displayText = q ? hlText(esc(text), q) : esc(text);
  return `<div class="sel-item" id="si_${it._sid}">
    <div class="sel-item-num">${esc(it['序号'])}</div>
    <div class="sel-item-body">
      <div class="sel-item-text" id="sit_${it._sid}">${displayText}</div>
      <textarea class="sel-item-edit fta" id="sie_${it._sid}" rows="4">${esc(text)}</textarea>
      <div class="sel-item-actions">
        <button class="item-btn copy" onclick="copySelText('${it._sid}')">📋 复制</button>
        <button class="item-btn" onclick="toggleEditSel('${it._sid}')">✏ 编辑</button>
        <button class="item-btn save" id="saveBtn_${it._sid}" onclick="saveSelItem('${it._sid}')" style="display:none">💾 保存</button>
        <button class="item-btn del" onclick="deleteSelItem('${it._sid}')">删除</button>
      </div>
    </div>
  </div>`;
}

function hlText(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(escRe(q),'gi'), m=>`<span class="highlight">${m}</span>`);
}
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function filterSel() { renderSel(); }

function toggleEditSel(sid) {
  const textEl = document.getElementById('sit_'+sid);
  const editEl = document.getElementById('sie_'+sid);
  const saveBtn = document.getElementById('saveBtn_'+sid);
  if (editEl.style.display === 'block') {
    editEl.style.display = 'none';
    textEl.style.display = '';
    saveBtn.style.display = 'none';
  } else {
    editEl.style.display = 'block';
    textEl.style.display = 'none';
    saveBtn.style.display = '';
    editEl.focus();
  }
}

function saveSelItem(sid) {
  const editEl = document.getElementById('sie_'+sid);
  const newVal = editEl.value;
  const it = selection.items.find(x => x._sid === sid);
  if (it) {
    it[currentCat] = newVal;
    saveAll();
    renderSelCounts();
    renderSel();
  }
}

function deleteSelItem(sid) {
  if (!confirm('删除该条卖点？')) return;
  const it = selection.items.find(x => x._sid === sid);
  if (it) {
    it[currentCat] = '';
    const allEmpty = getAllCats().every(c => !(it[c]||'').trim());
    if (allEmpty) selection.items = selection.items.filter(x => x._sid !== sid);
  }
  saveAll();
  renderSelCounts();
  renderSel();
}

function addSelItem() {
  renderSel();
  setTimeout(()=>{ const inp = document.getElementById('newItemInput'); if(inp) inp.focus(); }, 100);
}

function commitAddItem() {
  const input = document.getElementById('newItemInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  const nextNum = selection.items.length + 1;
  const sid = 'sel_' + Date.now();
  const newItem = { _sid: sid, '序号': String(nextNum) };
  getAllCats().forEach(c => { newItem[c] = ''; });
  newItem[currentCat] = val;
  selection.items.push(newItem);
  saveAll();
  renderSelCounts();
  renderSel();
}

function copySelText(sid) {
  const it = selection.items.find(x => x._sid === sid);
  if (!it) return;
  const text = it[currentCat] || '';
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════
//  REFERENCE DRAWER - works for both new & edit products
// ═══════════════════════════════════════════════════════
function openRef(cat, targetFieldId) {
  refTargetField = targetFieldId;
  const meta = getCustomCatMeta(cat);
  document.getElementById('refTitle').textContent = meta.emoji + ' ' + cat + ' 卖点库';

  const body = document.getElementById('refBody');
  body.innerHTML = '';

  const section = document.createElement('div');
  section.className = 'ref-section';

  const titleEl = document.createElement('div');
  titleEl.className = 'ref-section-title';
  titleEl.textContent = meta.emoji + ' ' + cat;
  section.appendChild(titleEl);

  const validItems = selection.items.filter(it => (it[cat]||'').trim());
  if (validItems.length) {
    validItems.forEach(it => {
      const text = it[cat] || '';
      const row = document.createElement('div');
      row.className = 'ref-row';

      const numEl = document.createElement('div');
      numEl.className = 'ref-row-num';
      numEl.textContent = it['序号'];

      const bodyEl = document.createElement('div');
      bodyEl.style.flex = '1';

      const textEl = document.createElement('div');
      textEl.className = 'ref-row-text';
      textEl.textContent = text;

      const hintEl = document.createElement('div');
      hintEl.className = 'ref-use-hint';
      hintEl.textContent = '↩ 点击追加到字段';

      bodyEl.appendChild(textEl);
      bodyEl.appendChild(hintEl);
      row.appendChild(numEl);
      row.appendChild(bodyEl);

      row.addEventListener('click', function(e) {
        e.stopPropagation();
        insertRef(text);
      });

      section.appendChild(row);
    });
  } else {
    const empty = document.createElement('div');
    empty.className = 'empty-sel';
    empty.innerHTML = '该维度暂无卖点条目<br><small style="color:var(--txt3)">请先到「卖点素材库」添加内容</small>';
    section.appendChild(empty);
  }

  body.appendChild(section);
  document.getElementById('refDrawer').classList.add('open');
}

function insertRef(text) {
  if (!refTargetField) return;
  const el = document.getElementById(refTargetField);
  if (!el) return;
  const cur = el.value.trim();
  el.value = cur ? cur + '\n\n' + text : text;
  el.focus();
  closeRef();
  showToast('已追加到字段 ✓');
}

function closeRef() { document.getElementById('refDrawer').classList.remove('open'); }

// ─── Ensure selection items have _sid ───
(function ensureSids() {
  selection.items.forEach((it, i) => {
    if (!it._sid) it._sid = 'sel_' + i + '_' + Date.now();
  });
})();

function exportExcel() {
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: 产品学习总结表 ──
  const h1 = ['编号','日期','产品类型','型号','料号','料号描述',
    '⚡ 计算与系统性能','🏭 工业稳定运行','🛡 工业环境适应','🔗 连接与扩展',

    '❗ 行业痛点','🏆 销售亮点','🌍 应用场景'];

  const rows1 = products.map(r=>[
    r['编号'],r['时间'],r['产品类型'],r['型号'],r['料号'],r['料号描述'],
    r['计算与系统性能'],r['工业稳定运行'],r['工业环境适应'],r['连接与扩展'],
    r['模块构成'],r['产品特点'],r['产品介绍'],r['行业痛点'],r['销售亮点'],r['应用场景']
  ]);

  const ws1 = XLSX.utils.aoa_to_sheet([h1,...rows1]);

  // Column widths
  ws1['!cols'] = [
    {wch:6},{wch:12},{wch:14},{wch:16},{wch:20},{wch:45},
    {wch:50},{wch:50},{wch:50},{wch:50},
    {wch:30},{wch:30},{wch:50},{wch:50},{wch:50},{wch:20}
  ];

  // Row heights: header tall, data rows auto
  ws1['!rows'] = [{hpt:28},...rows1.map(()=>({hpt:80}))];

  // Header style
  const headerStyle = {
    font:{bold:true, sz:11, color:{rgb:'FFFFFF'}},
    fill:{fgColor:{rgb:'1E2436'}},
    alignment:{wrapText:true, vertical:'center', horizontal:'center'},
    border:{
      bottom:{style:'medium',color:{rgb:'5B8DEE'}},
      right:{style:'thin',color:{rgb:'2D3554'}}
    }
  };

  // Apply header styles
  const range = XLSX.utils.decode_range(ws1['!ref']);
  for (let C = range.s.c; C <= range.e.c; C++) {
    const addr = XLSX.utils.encode_cell({r:0, c:C});
    if (!ws1[addr]) continue;
    ws1[addr].s = headerStyle;
  }

  // Data cell styles
  const dataStyle = {
    alignment:{wrapText:true, vertical:'top'},
    font:{sz:10},
    border:{
      bottom:{style:'thin',color:{rgb:'2D3554'}},
      right:{style:'thin',color:{rgb:'2D3554'}}
    }
  };

  const capStyle = {
    ...dataStyle,
    fill:{fgColor:{rgb:'1A2035'}}
  };

  for (let R = 1; R <= rows1.length; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (!ws1[addr]) ws1[addr] = {t:'s', v:''};
      ws1[addr].s = (C >= 6 && C <= 9) ? capStyle : dataStyle;
    }
  }

  XLSX.utils.book_append_sheet(wb, ws1, '2026产品学习总结表');

  // ── Sheet 2: 产品介绍快速参考（销售视角）──
  const h2 = ['产品型号','类型','料号','一句话定位','客户介绍话术','行业痛点','销售亮点','应用场景'];
  const rows2 = products.map(r=>[
    r['型号'],r['产品类型'],r['料号'],
    r['产品特点']||'',r['产品介绍']||'',
    r['行业痛点']||'',r['销售亮点']||'',r['应用场景']||''
  ]);

  const ws2 = XLSX.utils.aoa_to_sheet([h2,...rows2]);
  ws2['!cols'] = [{wch:16},{wch:14},{wch:20},{wch:30},{wch:60},{wch:50},{wch:60},{wch:20}];
  ws2['!rows'] = [{hpt:28},...rows2.map(()=>({hpt:90}))];

  const h2Style = {
    font:{bold:true, sz:11, color:{rgb:'FFFFFF'}},
    fill:{fgColor:{rgb:'1B3A2D'}},
    alignment:{wrapText:true, vertical:'center', horizontal:'center'},
    border:{bottom:{style:'medium',color:{rgb:'43D9A0'}}}
  };

  const r2 = XLSX.utils.decode_range(ws2['!ref']);
  for (let C = r2.s.c; C <= r2.e.c; C++) {
    const addr = XLSX.utils.encode_cell({r:0, c:C});
    if (!ws2[addr]) continue;
    ws2[addr].s = h2Style;
  }

  const salesStyle = {
    alignment:{wrapText:true, vertical:'top'},
    font:{sz:10},
    border:{bottom:{style:'thin',color:{rgb:'2D3554'}},right:{style:'thin',color:{rgb:'2D3554'}}}
  };
  const highlightStyle = {
    ...salesStyle,
    fill:{fgColor:{rgb:'1A2A1A'}}
  };

  for (let R = 1; R <= rows2.length; R++) {
    for (let C = r2.s.c; C <= r2.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (!ws2[addr]) ws2[addr] = {t:'s', v:''};
      ws2[addr].s = (C === 6) ? highlightStyle : salesStyle;
    }
  }

  XLSX.utils.book_append_sheet(wb, ws2, '🗂客户介绍快速参考');

  // ── Sheet 3: SELECTION卖点库 ──
  const cats = getAllCats();
  const h3 = ['序号',...cats.map(c=>'['+c+']')];
  const subH = ['',...cats.map(c=>selection.sub_headers[c]||'')];
  const rows3 = selection.items.map(it=>[it['序号'],...cats.map(c=>it[c]||'')]);

  const ws3 = XLSX.utils.aoa_to_sheet([h3,subH,...rows3]);
  ws3['!cols'] = [{wch:8},{wch:50},{wch:50},{wch:50},{wch:50}];
  ws3['!rows'] = [{hpt:28},{hpt:40},...rows3.map(()=>({hpt:80}))];

  const h3Style = {
    font:{bold:true, sz:11, color:{rgb:'FFFFFF'}},
    fill:{fgColor:{rgb:'252B3D'}},
    alignment:{wrapText:true, vertical:'center', horizontal:'center'},
    border:{bottom:{style:'medium',color:{rgb:'C678DD'}}}
  };

  const r3 = XLSX.utils.decode_range(ws3['!ref']);
  for (let C = r3.s.c; C <= r3.e.c; C++) {
    const addr = XLSX.utils.encode_cell({r:0, c:C});
    if (!ws3[addr]) continue;
    ws3[addr].s = h3Style;
  }

  const selDataStyle = {
    alignment:{wrapText:true, vertical:'top'},
    font:{sz:10},
    border:{bottom:{style:'thin',color:{rgb:'2D3554'}},right:{style:'thin',color:{rgb:'2D3554'}}}
  };
  for (let R = 1; R <= rows3.length+1; R++) {
    for (let C = r3.s.c; C <= r3.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (!ws3[addr]) ws3[addr] = {t:'s', v:''};
      ws3[addr].s = selDataStyle;
    }
  }

  XLSX.utils.book_append_sheet(wb, ws3, '📌SELECTION卖点库');

  const ts = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, `产品学习系统-Everly-${ts}.xlsx`);
  showToast('导出成功！');
}
</script>
</body>
</html>
