<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品学习系统 · Everly</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0f1117;--sur:#181c27;--sur2:#1e2436;--sur3:#252b3d;--bdr:#2d3554;--bdr2:#3a4260;--acc:#5b8dee;--acc2:#43d9a0;--acc3:#f0a84a;--acc4:#c678dd;--red:#e06c75;--txt:#d4daf5;--txt2:#8892b8;--txt3:#515d8a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;line-height:1.6;}
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;gap:12px;}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#5b8dee,#c678dd);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:700;}.hdr-sub{font-size:11px;color:var(--txt3);margin-top:1px;}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--bdr);font-size:12.5px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .18s;font-weight:500;white-space:nowrap;}
.btn-prim{background:var(--acc);color:#fff;border-color:var(--acc);}.btn-prim:hover{background:#7aa3f5;}
.btn-ok{background:rgba(67,217,160,.14);color:var(--acc2);border-color:rgba(67,217,160,.28);}.btn-ok:hover{background:rgba(67,217,160,.24);}
.btn-ghost{background:transparent;color:var(--txt2);}.btn-ghost:hover{background:var(--sur2);color:var(--txt);}
.btn-danger{background:rgba(224,108,117,.1);color:var(--red);border-color:rgba(224,108,117,.22);}.btn-danger:hover{background:rgba(224,108,117,.2);}
.saved{font-size:12px;color:var(--acc2);display:none;align-items:center;gap:4px;}.saved.show{display:inline-flex;}
.tabs-bar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 24px;display:flex;gap:2px;}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--txt3);border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab:hover{color:var(--txt2);}.tab.active{color:var(--acc);border-bottom-color:var(--acc);}
.main{padding:22px 24px;max-width:1700px;margin:0 auto;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.swrap{position:relative;flex:1;min-width:180px;max-width:340px;}
.swrap input{width:100%;background:var(--sur);border:1px solid var(--bdr);color:var(--txt);padding:8px 12px 8px 33px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .18s;}
.swrap input:focus{border-color:var(--acc);}
.swrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;}
.fsel{background:var(--sur);border:1px solid var(--bdr);color:var(--txt);padding:8px 12px;border-radius:7px;font-size:12.5px;font-family:inherit;cursor:pointer;outline:none;}
.fsel:focus{border-color:var(--acc);}
.cnt{font-size:12px;color:var(--txt3);padding:8px 4px;}
.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;padding:11px 16px;}
.stat-lbl{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.stat-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.tbl-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--sur2);padding:10px 13px;text-align:left;font-weight:600;font-size:11px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--txt2);}
thead th.sa::after{content:' ▲';font-size:9px;}thead th.sd::after{content:' ▼';font-size:9px;}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .12s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:var(--sur2);}
tbody td{padding:11px 13px;vertical-align:middle;}
.no-data{text-align:center;padding:48px;color:var(--txt3);}
.cell-clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.t-blu{background:rgba(91,141,238,.13);color:var(--acc);border:1px solid rgba(91,141,238,.22);}
.t-grn{background:rgba(67,217,160,.12);color:var(--acc2);border:1px solid rgba(67,217,160,.22);}
.t-gld{background:rgba(240,168,74,.12);color:var(--acc3);border:1px solid rgba(240,168,74,.22);}
.t-pur{background:rgba(198,120,221,.12);color:var(--acc4);border:1px solid rgba(198,120,221,.22);}
.t-org{background:rgba(255,160,60,.1);color:#ffa03c;border:1px solid rgba(255,160,60,.2);}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:400;align-items:flex-start;justify-content:center;padding:28px 20px;backdrop-filter:blur(3px);overflow-y:auto;}
.ov.open{display:flex;}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;max-width:960px;width:100%;animation:mIn .2s ease;position:relative;margin:auto;}
@keyframes mIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
.mhdr{padding:17px 22px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.mtitle{font-size:17px;font-weight:700;}.msub{font-size:12px;color:var(--txt3);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.mcls{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:2px 7px;border-radius:5px;line-height:1;}
.mcls:hover{background:var(--sur2);color:var(--txt);}
.mbody{padding:18px 22px 22px;max-height:80vh;overflow-y:auto;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.fgrp{display:flex;flex-direction:column;gap:5px;}.fgrp.full{grid-column:1/-1;}
.flbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.55px;color:var(--txt3);display:flex;align-items:center;gap:8px;}
.ref-btn{font-size:11px;padding:2px 9px;background:rgba(91,141,238,.1);color:var(--acc);border:1px solid rgba(91,141,238,.22);border-radius:5px;cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500;}
.ref-btn:hover{background:rgba(91,141,238,.2);}
.fi,.fta{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);padding:8px 11px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .18s;width:100%;}
.fi:focus,.fta:focus{border-color:var(--acc);}
.fta{resize:vertical;min-height:88px;line-height:1.65;}.fta.tall{min-height:130px;}
.mfooter{display:flex;gap:9px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr);}
.sel-layout{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start;}
.sel-sidebar{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;position:sticky;top:80px;}
.sel-sbar-hdr{padding:11px 16px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bdr);background:var(--sur2);}
.cat-btn{width:100%;padding:11px 16px;background:none;border:none;border-bottom:1px solid var(--bdr);cursor:pointer;text-align:left;font-family:inherit;font-size:13px;font-weight:500;color:var(--txt2);display:flex;align-items:center;gap:10px;transition:all .15s;}
.cat-btn:last-child{border-bottom:none;}.cat-btn:hover{background:var(--sur2);color:var(--txt);}
.cat-btn.active{background:rgba(91,141,238,.1);color:var(--acc);}
.cpill{margin-left:auto;font-size:10.5px;background:var(--sur2);color:var(--txt3);padding:1px 7px;border-radius:10px;min-width:24px;text-align:center;}
.cat-btn.active .cpill{background:rgba(91,141,238,.15);color:var(--acc);}
.sel-content{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
.sel-c-hdr{padding:13px 18px;border-bottom:1px solid var(--bdr);}
.sel-c-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sub-hdr-wrap{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.sub-hdr-text{font-size:11.5px;color:var(--txt3);line-height:1.55;white-space:pre-wrap;flex:1;cursor:pointer;}
.sub-hdr-text:hover{color:var(--txt2);}
.sub-hdr-edit{min-height:70px;font-size:12.5px;flex:1;display:none;}
.sub-hdr-btns{display:none;gap:6px;align-items:center;}
.sel-list{}.sel-item{border-bottom:1px solid var(--bdr);padding:13px 18px;display:flex;gap:10px;transition:background .12s;}
.sel-item:last-child{border-bottom:none;}.sel-item:hover{background:var(--sur2);}
.snum{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3);min-width:22px;padding-top:2px;font-weight:600;}
.sbody{flex:1;min-width:0;}
.stext{font-size:13px;line-height:1.7;color:var(--txt2);white-space:pre-wrap;word-break:break-word;}
.sactions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.ibtn{padding:3px 10px;font-size:11px;border-radius:5px;border:1px solid var(--bdr);background:transparent;cursor:pointer;font-family:inherit;color:var(--txt2);transition:all .13s;}
.ibtn:hover{background:var(--sur3);color:var(--txt);}
.ibtn.cp{color:var(--acc);border-color:rgba(91,141,238,.28);}.ibtn.cp:hover{background:rgba(91,141,238,.1);}
.ibtn.sv{color:var(--acc2);border-color:rgba(67,217,160,.28);}.ibtn.sv:hover{background:rgba(67,217,160,.1);}
.ibtn.dl{color:var(--red);border-color:rgba(224,108,117,.22);}.ibtn.dl:hover{background:rgba(224,108,117,.1);}
.sedit{display:none;width:100%;min-height:80px;resize:vertical;background:var(--sur2);border:1px solid var(--acc);color:var(--txt);padding:8px 10px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;line-height:1.65;margin-bottom:6px;}
.add-row{padding:12px 18px;border-top:1px solid var(--bdr);display:flex;gap:9px;align-items:flex-end;}
.add-row textarea{flex:1;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);padding:8px 11px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:60px;line-height:1.65;}
.add-row textarea:focus{border-color:var(--acc);}
.empty-sel{padding:28px;text-align:center;color:var(--txt3);font-size:13px;}
.ref-drawer{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center;}
.ref-drawer.open{display:flex;}
.ref-bd{position:absolute;inset:0;background:rgba(0,0,0,.58);}
.ref-panel{position:relative;background:var(--sur);border:1px solid var(--bdr);border-radius:14px 14px 0 0;width:100%;max-width:800px;max-height:68vh;display:flex;flex-direction:column;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(18px);opacity:0;}to{transform:none;opacity:1;}}
.ref-ph{padding:13px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;}
.ref-ptitle{font-size:14px;font-weight:700;}.ref-psub{font-size:11.5px;color:var(--txt3);margin-top:3px;}
.ref-pc{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:2px 7px;border-radius:5px;}
.ref-pc:hover{background:var(--sur2);}
.ref-body{overflow-y:auto;flex:1;}
.ref-row{padding:12px 20px;border-bottom:1px solid rgba(45,53,84,.5);display:flex;gap:10px;cursor:pointer;transition:background .12s;}
.ref-row:last-child{border-bottom:none;}.ref-row:hover{background:var(--sur2);}
.ref-rnum{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3);min-width:20px;padding-top:2px;}
.ref-rtext{font-size:12.5px;color:var(--txt2);line-height:1.65;flex:1;white-space:pre-wrap;word-break:break-word;}
.ref-row:hover .ref-rtext{color:var(--txt);}
.ref-hint{font-size:10px;color:var(--acc);margin-top:4px;opacity:0;}.ref-row:hover .ref-hint{opacity:1;}
.ref-empty{padding:24px;text-align:center;color:var(--txt3);font-size:13px;}
.toast{position:fixed;bottom:26px;right:26px;background:var(--acc2);color:#0f1117;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--txt3);}
.hl{background:rgba(91,141,238,.22);border-radius:2px;padding:0 1px;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">E</div>
    <div><div class="hdr-title">产品学习系统</div><div class="hdr-sub">Everly · 2026 工业电脑知识库 · 可编辑 · 本地自动保存</div></div>
  </div>
  <div class="hdr-actions">
    <span class="saved" id="savedMsg">✓ 已保存</span>
    <button class="btn btn-ok" onclick="exportExcel()">⬇ 导出 Excel</button>
    <button class="btn btn-prim" onclick="openAdd()">＋ 新增产品</button>
  </div>
</div>
<div class="tabs-bar">
  <div class="tab active" onclick="switchTab('t1',this)">📋 2026 产品学习总结表</div>
  <div class="tab" onclick="switchTab('t2',this)">📌 SELECTION 卖点素材库</div>
</div>
<div class="main">
<div class="tab-panel active" id="t1">
  <div class="stats" id="statsBar"></div>
  <div class="toolbar">
    <div class="swrap"><span class="si">🔍</span><input type="text" id="srch" placeholder="搜索型号、料号、描述…" oninput="doFilter()"></div>
    <select class="fsel" id="typeFilt" onchange="doFilter()"><option value="">全部类型</option></select>
    <span class="cnt" id="cntBadge"></span>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="doSort(0)" style="width:46px">#</th>
        <th onclick="doSort(1)" style="width:84px">日期</th>
        <th onclick="doSort(2)" style="width:110px">类型</th>
        <th onclick="doSort(3)" style="width:145px">型号</th>
        <th onclick="doSort(4)" style="width:128px">料号</th>
        <th>料号描述</th>
        <th style="width:150px">产品特点/场景</th>
        <th style="width:78px">操作</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div class="tab-panel" id="t2">
  <div class="toolbar">
    <div class="swrap" style="max-width:300px"><span class="si">🔍</span><input type="text" id="selSrch" placeholder="搜索卖点内容…" oninput="renderSel()"></div>
    <span style="font-size:12px;color:var(--txt3);padding:8px 4px;">💡 填写产品时点「引用卖点库」可快速插入内容</span>
  </div>
  <div class="sel-layout">
    <div class="sel-sidebar">
      <div class="sel-sbar-hdr">能力维度</div>
      <button class="cat-btn active" id="catBtn_0" onclick="switchCat(0)"><span>⚡</span>计算与系统性能<span class="cpill" id="cp0">0</span></button>
      <button class="cat-btn" id="catBtn_1" onclick="switchCat(1)"><span>🏭</span>工业稳定运行<span class="cpill" id="cp1">0</span></button>
      <button class="cat-btn" id="catBtn_2" onclick="switchCat(2)"><span>🛡</span>工业环境适应<span class="cpill" id="cp2">0</span></button>
      <button class="cat-btn" id="catBtn_3" onclick="switchCat(3)"><span>🔗</span>连接与扩展<span class="cpill" id="cp3">0</span></button>
    </div>
    <div class="sel-content" id="selContent"></div>
  </div>
</div>
</div>

<div class="ov" id="editOv" onclick="if(event.target===this)closeEdit()">
<div class="modal">
  <div class="mhdr">
    <div><div class="mtitle" id="editTitle">产品详情</div><div class="msub" id="editSub"></div></div>
    <button class="mcls" onclick="closeEdit()">✕</button>
  </div>
  <div class="mbody">
    <div class="fg">
      <div class="fgrp"><label class="flbl">日期</label><input class="fi" id="f_date" type="date"></div>
      <div class="fgrp"><label class="flbl">产品类型</label><input class="fi" id="f_type" placeholder="EPC BOX PC / UTC / AI…"></div>
      <div class="fgrp"><label class="flbl">型号</label><input class="fi" id="f_model" placeholder="如 EPC-309A"></div>
      <div class="fgrp"><label class="flbl">料号</label><input class="fi" id="f_pn" placeholder="如 C10.03.03.005"></div>
      <div class="fgrp full"><label class="flbl">料号描述</label><textarea class="fta" id="f_desc"></textarea></div>
      <div class="fgrp full"><label class="flbl">⚡ 计算与系统性能 <span class="ref-btn" onclick="openRef(0,'f_perf')">引用卖点库 ↗</span></label><textarea class="fta tall" id="f_perf"></textarea></div>
      <div class="fgrp full"><label class="flbl">🏭 工业稳定运行 <span class="ref-btn" onclick="openRef(1,'f_stab')">引用卖点库 ↗</span></label><textarea class="fta tall" id="f_stab"></textarea></div>
      <div class="fgrp full"><label class="flbl">🛡 工业环境适应 <span class="ref-btn" onclick="openRef(2,'f_env')">引用卖点库 ↗</span></label><textarea class="fta tall" id="f_env"></textarea></div>
      <div class="fgrp full"><label class="flbl">🔗 连接与扩展 <span class="ref-btn" onclick="openRef(3,'f_conn')">引用卖点库 ↗</span></label><textarea class="fta tall" id="f_conn"></textarea></div>
      <div class="fgrp full"><label class="flbl">🧩 模块构成</label><textarea class="fta" id="f_module"></textarea></div>
      <div class="fgrp full"><label class="flbl">✨ 产品特点（一句话定位）</label><input class="fi" id="f_feat"></div>
      <div class="fgrp full"><label class="flbl">💡 产品介绍（对客户说的话）</label><textarea class="fta tall" id="f_intro"></textarea></div>
      <div class="fgrp full"><label class="flbl">❗ 行业痛点</label><textarea class="fta" id="f_pain"></textarea></div>
      <div class="fgrp full"><label class="flbl">🏆 销售亮点</label><textarea class="fta tall" id="f_high"></textarea></div>
      <div class="fgrp"><label class="flbl">🌍 应用场景</label><input class="fi" id="f_scene"></div>
      <div class="fgrp"><label class="flbl">编号</label><input class="fi" id="f_num"></div>
    </div>
    <div class="mfooter">
      <button class="btn btn-danger" id="delBtn" onclick="delProduct()">删除产品</button>
      <button class="btn btn-ghost" onclick="closeEdit()">取消</button>
      <button class="btn btn-prim" onclick="saveProduct()">💾 保存</button>
    </div>
  </div>
</div>
</div>

<div class="ref-drawer" id="refDrawer">
  <div class="ref-bd" onclick="closeRef()"></div>
  <div class="ref-panel">
    <div class="ref-ph">
      <div><div class="ref-ptitle" id="refTitle"></div><div class="ref-psub">点击条目 → 追加到当前字段末尾</div></div>
      <button class="ref-pc" onclick="closeRef()">✕</button>
    </div>
    <div class="ref-body" id="refBody"></div>
  </div>

<script>

function tc(t){ return TC[t]||{cls:'t-blu',dot:'#5b8dee'}; }
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadState(){
  try {
    const p = localStorage.getItem('everly_p');
    const s = localStorage.getItem('everly_s');
    return {
      products: p ? JSON.parse(p) : INITIAL.sheet1.map(function(r,i){ return Object.assign({},r,{_id:i+1}); }),
      sel: s ? JSON.parse(s) : INITIAL.sheet2
    };
  } catch(e) {
    return {
      products: INITIAL.sheet1.map(function(r,i){ return Object.assign({},r,{_id:i+1}); }),
      sel: INITIAL.sheet2
    };
  }
}

var sel = state.sel;
sel.items.forEach(function(it,i){ if(!it._sid) it._sid = 's'+i; });

function persist(){
  try {
    localStorage.setItem('everly_p', JSON.stringify(products));
    localStorage.setItem('everly_s', JSON.stringify(sel));
    var el = document.getElementById('savedMsg');
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.classList.remove('show'); }, 1800);
  } catch(e) {}
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

function buildTypeFilter(){
  var types = [];
  products.forEach(function(r){ if(r['产品类型'] && types.indexOf(r['产品类型'])<0) types.push(r['产品类型']); });
  var s = document.getElementById('typeFilt');
  types.forEach(function(t){ var o = document.createElement('option'); o.value=t; o.textContent=t; s.appendChild(o); });
}

function renderStats(){
  var cnt = {};
  products.forEach(function(r){ if(r['产品类型']) cnt[r['产品类型']] = (cnt[r['产品类型']]||0)+1; });
  var html = '<div class="stat"><div class="stat-lbl">产品总数</div><div class="stat-val" style="color:var(--acc)">'+products.length+'</div></div>';
  Object.keys(cnt).forEach(function(k){ html += '<div class="stat"><div class="stat-lbl">'+k+'</div><div class="stat-val" style="color:'+tc(k).dot+'">'+cnt[k]+'</div></div>'; });
  document.getElementById('statsBar').innerHTML = html;
}

function renderTable(){
  var tbody = document.getElementById('tbody');
  document.getElementById('cntBadge').textContent = '共 '+filtered.length+' 条';
  if(!filtered.length){ tbody.innerHTML = '<tr><td colspan="8" class="no-data">没有匹配的产品</td></tr>'; return; }
  var rows = '';
  filtered.forEach(function(r){
    var t = tc(r['产品类型']);
    var desc = (r['料号描述']||'').substring(0,50);
    var feat = r['产品特点']||r['应用场景']||'';
    rows += '<tr onclick="openEdit('+r._id+')">'
      +'<td class="mono" style="color:var(--txt3)">'+esc(r['编号']||'')+'</td>'
      +'<td style="font-size:12px;color:var(--txt3)">'+esc(r['时间']||'—')+'</td>'
      +'<td><span class="tag '+t.cls+'">'+esc(r['产品类型']||'—')+'</span></td>'
      +'<td class="mono" style="font-weight:600;color:var(--txt)">'+esc(r['型号']||'—')+'</td>'
      +'<td class="mono" style="color:var(--txt2)">'+esc(r['料号']||'—')+'</td>'
      +'<td><div class="cell-clip" style="color:var(--txt2)">'+esc(desc)+((r['料号描述']||'').length>50?'…':'')+'</div></td>'
      +'<td><div class="cell-clip" style="color:'+(feat?'var(--acc3)':'var(--txt3)')+'">'+esc(feat?feat.substring(0,36)+(feat.length>36?'…':''):'—')+'</div></td>'
      +'<td onclick="event.stopPropagation()"><button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="openEdit('+r._id+')">✏ 编辑</button></td>'
      +'</tr>';
  });
  tbody.innerHTML = rows;
}

  filtered = products.filter(function(r){
    return (!type || r['产品类型']===type) && (!q || JSON.stringify(r).toLowerCase().indexOf(q)>=0);
  });
  if(sCol>=0) applySort();
  renderTable();
}

var SKEYS = [null,'时间','产品类型','型号','料号'];
function doSort(col){
  if(!SKEYS[col]) return;
  sDir = (sCol===col) ? -sDir : 1;
  sCol = col;
  document.querySelectorAll('thead th').forEach(function(th,i){ th.classList.remove('sa','sd'); if(i===col) th.classList.add(sDir===1?'sa':'sd'); });
  applySort();
  renderTable();
}
function applySort(){
  var k = SKEYS[sCol];
  if(!k) return;
  filtered.sort(function(a,b){ return (a[k]||'').localeCompare(b[k]||'','zh')*sDir; });
}

var FMAP = {f_num:'编号',f_date:'时间',f_type:'产品类型',f_model:'型号',f_pn:'料号',f_desc:'料号描述',
  f_perf:'计算与系统性能',f_stab:'工业稳定运行',f_env:'工业环境适应',f_conn:'连接与扩展',
  f_module:'模块构成',f_feat:'产品特点',f_intro:'产品介绍',f_pain:'行业痛点',f_high:'销售亮点',f_scene:'应用场景'};

function openEdit(id){
  var r = null;
  products.forEach(function(x){ if(x._id===id) r=x; });
  if(!r) return;
  editId = id;
  document.getElementById('editTitle').textContent = r['型号']||'产品详情';
  document.getElementById('editSub').textContent = r['料号']||'';
  document.getElementById('delBtn').style.display = '';
  Object.keys(FMAP).forEach(function(fid){ var el=document.getElementById(fid); if(el) el.value=r[FMAP[fid]]||''; });
  document.getElementById('editOv').classList.add('open');
}
function openAdd(){
  editId = null;
  var maxNum = 0;
  products.forEach(function(p){ var n=parseInt(p['编号'])||0; if(n>maxNum) maxNum=n; });
  Object.keys(FMAP).forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('f_num').value = String(maxNum+1);
  document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('editTitle').textContent = '新增产品';
  document.getElementById('editSub').textContent = '填写完毕后点保存';
  document.getElementById('delBtn').style.display = 'none';
  document.getElementById('editOv').classList.add('open');
}
function closeEdit(){ document.getElementById('editOv').classList.remove('open'); }
function saveProduct(){
  var data = {};
  Object.keys(FMAP).forEach(function(fid){ var el=document.getElementById(fid); if(el) data[FMAP[fid]]=el.value.trim(); });
  if(editId!==null){
    for(var i=0;i<products.length;i++){
      if(products[i]._id===editId){ products[i]=Object.assign({},products[i],data); break; }
    }
  } else {
    data._id = Date.now();
    products.push(data);
    var s = document.getElementById('typeFilt');
    var exists = false;
    for(var i=0;i<s.options.length;i++){ if(s.options[i].value===data['产品类型']) exists=true; }
    if(data['产品类型']&&!exists){ var o=document.createElement('option'); o.value=data['产品类型']; o.textContent=data['产品类型']; s.appendChild(o); }
  }
  filtered = products.slice();
  renderStats(); renderTable(); persist(); closeEdit(); toast('保存成功');
}
function delProduct(){
  if(!confirm('确认删除该产品？')) return;
  products = products.filter(function(p){ return p._id!==editId; });
  filtered = products.slice();
  renderStats(); renderTable(); persist(); closeEdit(); toast('已删除');
}

function renderCatCounts(){
  CATS.forEach(function(c,i){
    var cnt = 0;
    sel.items.forEach(function(it){ if((it[c]||'').trim()) cnt++; });
    var el = document.getElementById('cp'+i);
    if(el) el.textContent = cnt;
  });
}

function switchCat(idx){
  curCat = idx;
  for(var i=0;i<4;i++){
    var btn = document.getElementById('catBtn_'+i);
    if(btn){ if(i===idx) btn.classList.add('active'); else btn.classList.remove('active'); }
  }
  renderSel();
}

function renderSel(){
  var q = '';
  var srch = document.getElementById('selSrch');
  if(srch) q = srch.value.toLowerCase();
  var cat = CATS[curCat];
  var sub = sel.sub_headers[cat]||'';

  var items = sel.items.filter(function(it){
    return (it[cat]||'').trim() && (!q || (it[cat]||'').toLowerCase().indexOf(q)>=0);
  });

  var listHtml = '';
  if(items.length){
    items.forEach(function(it){ listHtml += renderItem(it, q, cat); });
  } else {
    listHtml = '<div class="empty-sel">暂无内容，在下方输入框添加</div>';
  }

  var subDisplay = sub ? esc(sub) : '<em style="color:var(--txt3)">点击「编辑说明」添加维度说明…</em>';

  var html = '<div class="sel-c-hdr">'
    + '<div class="sel-c-title" style="color:'+CAT_COLOR[curCat]+'">'+CAT_EMOJI[curCat]+' '+cat+'能力</div>'
    + '<div class="sub-hdr-wrap">'
    + '<div class="sub-hdr-text" id="subTxt">'+subDisplay+'</div>'
    + '<textarea class="sub-hdr-edit fta" id="subEdit">'+esc(sub)+'</textarea>'
    + '<div class="sub-hdr-btns" id="subBtns">'
    + '<button class="ibtn sv" onclick="saveSubHdr()">💾 保存</button>'
    + '<button class="ibtn" onclick="cancelSubHdr()">取消</button>'
    + '</div>'
    + '<button class="ibtn" id="subEditBtn" onclick="editSubHdr()">✏ 编辑说明</button>'
    + '</div>'
    + '</div>'
    + '<div id="selList">'+listHtml+'</div>'
    + '<div class="add-row">'
    + '<textarea id="newTxt" placeholder="输入新卖点内容…" rows="2"></textarea>'
    + '<button class="btn btn-prim" onclick="commitAdd()" style="align-self:flex-end">添加</button>'
    + '</div>';

  document.getElementById('selContent').innerHTML = html;
}

function renderItem(it, q, cat){
  var text = it[cat]||'';
  var disp = q ? hlTxt(esc(text),q) : esc(text);
  var sid = it._sid;
  return '<div class="sel-item" id="si_'+sid+'">'
    +'<div class="snum">'+esc(it['序号'])+'</div>'
    +'<div class="sbody">'
    +'<div class="stext" id="st_'+sid+'">'+disp+'</div>'
    +'<textarea class="sedit" id="se_'+sid+'"></textarea>'
    +'<div class="sactions">'
    +'<button class="ibtn cp" onclick="copyItem(\'' +sid+ '\')">📋 复制</button>'
    +'<button class="ibtn" id="eb_'+sid+'" onclick="startEdit(\'' +sid+ '\')">✏ 编辑</button>'
    +'<button class="ibtn sv" id="sb_'+sid+'" onclick="saveItem(\'' +sid+ '\')" style="display:none">💾 保存</button>'
    +'<button class="ibtn" id="cb_'+sid+'" onclick="cancelEdit(\'' +sid+ '\')" style="display:none">取消</button>'
    +'<button class="ibtn dl" onclick="delItem(\'' +sid+ '\')">删除</button>'
    +'</div></div></div>';
}

function startEdit(sid){
  var it = null; sel.items.forEach(function(x){ if(x._sid===sid) it=x; });
  if(!it) return;
  document.getElementById('st_'+sid).style.display='none';
  var se = document.getElementById('se_'+sid);
  se.value = it[CATS[curCat]]||'';
  se.style.display='block'; se.focus();
  document.getElementById('eb_'+sid).style.display='none';
  document.getElementById('sb_'+sid).style.display='';
  document.getElementById('cb_'+sid).style.display='';
}
function cancelEdit(sid){
  document.getElementById('st_'+sid).style.display='';
  document.getElementById('se_'+sid).style.display='none';
  document.getElementById('eb_'+sid).style.display='';
  document.getElementById('sb_'+sid).style.display='none';
  document.getElementById('cb_'+sid).style.display='none';
}
function saveItem(sid){
  var se = document.getElementById('se_'+sid);
  var it = null; sel.items.forEach(function(x){ if(x._sid===sid) it=x; });
  if(it){ it[CATS[curCat]]=se.value; persist(); renderCatCounts(); renderSel(); toast('已保存'); }
}
function delItem(sid){
  if(!confirm('删除该卖点？')) return;
  var it = null; sel.items.forEach(function(x){ if(x._sid===sid) it=x; });
  if(it){
    it[CATS[curCat]]='';
    var allEmpty=true;
    CATS.forEach(function(c){ if((it[c]||'').trim()) allEmpty=false; });
    if(allEmpty) sel.items=sel.items.filter(function(x){ return x._sid!==sid; });
  }
  persist(); renderCatCounts(); renderSel(); toast('已删除');
}
function copyItem(sid){
  var it = null; sel.items.forEach(function(x){ if(x._sid===sid) it=x; });
  if(it) navigator.clipboard.writeText(it[CATS[curCat]]||'').then(function(){ toast('已复制'); });
}
function commitAdd(){
  var inp = document.getElementById('newTxt');
  if(!inp) return;
  var val = inp.value.trim();
  if(!val) return;
  var sid = 's'+Date.now();
  var newIt = {_sid:sid,'序号':String(sel.items.length+1)};
  CATS.forEach(function(c){ newIt[c]=''; });
  newIt[CATS[curCat]] = val;
  sel.items.push(newIt);
  persist(); renderCatCounts(); renderSel(); toast('已添加');
}

function editSubHdr(){
  document.getElementById('subTxt').style.display='none';
  document.getElementById('subEdit').style.display='block';
  document.getElementById('subBtns').style.display='flex';
  document.getElementById('subEditBtn').style.display='none';
  document.getElementById('subEdit').focus();
}
function saveSubHdr(){
  sel.sub_headers[CATS[curCat]] = document.getElementById('subEdit').value.trim();
  persist(); renderSel(); toast('维度说明已保存');
}
function cancelSubHdr(){ renderSel(); }

function hlTxt(text,q){
  if(!q) return text;
  try {
    var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    return text.replace(re,function(m){ return '<span class="hl">'+m+'</span>'; });
  } catch(e){ return text; }
}

function openRef(catIdx, fieldId){
  refField = fieldId;
  var cat = CATS[catIdx];
  document.getElementById('refTitle').textContent = CAT_EMOJI[catIdx]+' '+cat+' 卖点库';
  var items = sel.items.filter(function(it){ return (it[cat]||'').trim(); });
  var html = '';
  if(items.length){
    items.forEach(function(it){
      html += '<div class="ref-row" onclick="insertRef(\''+cat+'\',\''+it._sid+'\')"><div class="ref-rnum">'+esc(it['序号'])+'</div><div><div class="ref-rtext">'+esc(it[cat]||'')+'</div><div class="ref-hint">↩ 点击追加</div></div></div>';
    });
  } else {
    html = '<div class="ref-empty">该维度暂无卖点，请先在素材库添加</div>';
  }
  document.getElementById('refBody').innerHTML = html;
  document.getElementById('refDrawer').classList.add('open');
}
function insertRef(cat,sid){
  var it = null; sel.items.forEach(function(x){ if(x._sid===sid) it=x; });
  if(!it||!refField) return;
  var field = document.getElementById(refField);
  if(!field) return;
  var cur = field.value.trim();
  field.value = cur ? cur+'\n\n'+it[cat] : it[cat];
  field.focus(); closeRef(); toast('已追加到字段');
}
function closeRef(){ document.getElementById('refDrawer').classList.remove('open'); }

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function exportExcel(){
  var wb = XLSX.utils.book_new();
  var h1=['编号','日期','产品类型','型号','料号','料号描述','计算与系统性能能力','工业稳定运行能力','工业环境适应能力','连接与扩展能力','模块构成','产品特点','产品介绍','行业痛点','销售亮点','应用场景'];
  var r1=products.map(function(r){ return [r['编号'],r['时间'],r['产品类型'],r['型号'],r['料号'],r['料号描述'],r['计算与系统性能'],r['工业稳定运行'],r['工业环境适应'],r['连接与扩展'],r['模块构成'],r['产品特点'],r['产品介绍'],r['行业痛点'],r['销售亮点'],r['应用场景']]; });
  var ws1=XLSX.utils.aoa_to_sheet([h1].concat(r1));
  ws1['!cols']=[6,11,14,16,18,40,40,40,40,40,28,28,40,40,40,18].map(function(w){ return {wch:w}; });
  XLSX.utils.book_append_sheet(wb,ws1,'2026产品学习总结表');
  var h2=['序号'].concat(CATS.map(function(c){ return c+'能力'; }));
  var sh=[''].concat(CATS.map(function(c){ return sel.sub_headers[c]||''; }));
  var r2=sel.items.map(function(it){ return [it['序号']].concat(CATS.map(function(c){ return it[c]||''; })); });
  var ws2=XLSX.utils.aoa_to_sheet([h2,sh].concat(r2));
  ws2['!cols']=[8,45,45,45,45].map(function(w){ return {wch:w}; });
  XLSX.utils.book_append_sheet(wb,ws2,'SELECTION卖点库');
  var ts=new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb,'产品学习系统-Everly-'+ts+'.xlsx');
}
</script>
